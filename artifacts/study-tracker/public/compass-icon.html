<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; padding: 0; background: #fdfbf7; display: flex; justify-content: center; align-items: center; height: 100vh; }
    svg { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
    <!-- Outer circle background -->
    <circle cx="96" cy="96" r="90" fill="#0f766e" opacity="0.1"/>
    
    <!-- Main compass circle -->
    <circle cx="96" cy="96" r="80" fill="none" stroke="#0f766e" stroke-width="12"/>
    
    <!-- Compass teal ring -->
    <circle cx="96" cy="96" r="75" fill="none" stroke="#06b6d4" stroke-width="8"/>
    
    <!-- Cardinal marks -->
    <g stroke="#0f766e" stroke-width="3" stroke-linecap="round">
      <!-- North -->
      <line x1="96" y1="16" x2="96" y2="30"/>
      <!-- South -->
      <line x1="96" y1="162" x2="96" y2="176"/>
      <!-- East -->
      <line x1="162" y1="96" x2="176" y2="96"/>
      <!-- West -->
      <line x1="16" y1="96" x2="30" y2="96"/>
      <!-- NE marker -->
      <line x1="140" y1="52" x2="150" y2="42"/>
      <!-- SE marker -->
      <line x1="140" y1="140" x2="150" y2="150"/>
    </g>
    
    <!-- Compass needle - Teal (pointing NE) -->
    <g>
      <!-- Teal point (North-East) -->
      <polygon points="96,96 145,50 130,75" fill="#06b6d4" opacity="0.95"/>
      <!-- Gray back (South-West) -->
      <polygon points="96,96 47,142 62,117" fill="#9ca3af" opacity="0.6"/>
    </g>
    
    <!-- Needle center circle -->
    <circle cx="96" cy="96" r="8" fill="white" stroke="#0f766e" stroke-width="2"/>
    <circle cx="96" cy="96" r="5" fill="#0f766e"/>
  </svg>
</body>
</html>
